services:
  - type: web
    name: sudoku-automation-solver
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install --no-cache-dir --upgrade pip setuptools wheel
      pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn backend.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
